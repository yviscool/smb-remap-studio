name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: bash ./setup_remap_tool.sh

      - name: Verify gamepad backend
        run: .venv/bin/python -c "import pygame"

      - name: Smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: .venv/bin/python smb_remap_tool.py --smoke-test

      - name: Build standalone binary
        run: bash ./build_standalone.sh

      - name: Package release files
        run: |
          mkdir -p release
          cp SMBRemapStudio release/SMBRemapStudio-linux-x86_64
          sha256sum release/SMBRemapStudio-linux-x86_64 > release/SMBRemapStudio-linux-x86_64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smb-remap-studio-linux
          path: release/*

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: powershell
        run: .\setup_remap_tool.ps1

      - name: Verify gamepad backend
        shell: powershell
        run: .\.venv\Scripts\python.exe -c "import pygame"

      - name: Smoke test
        shell: powershell
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          .\.venv\Scripts\python.exe smb_remap_tool.py --smoke-test

      - name: Build standalone binary
        shell: powershell
        run: .\build_standalone.ps1

      - name: Package release files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath SMBRemapStudio.exe -Destination release\SMBRemapStudio-windows-x86_64.exe -Force
          $hash = (Get-FileHash release\SMBRemapStudio-windows-x86_64.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -LiteralPath release\SMBRemapStudio-windows-x86_64.exe.sha256 -Value "$hash  SMBRemapStudio-windows-x86_64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smb-remap-studio-windows
          path: release/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --generate-notes
          fi
