name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linux Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libdbus-1-3 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: bash ./setup_remap_tool.sh

      - name: Check optional gamepad backend
        run: |
          if .venv/bin/python -c "import pygame"; then
            echo "pygame backend available."
          else
            echo "::warning::pygame backend unavailable on Linux build; packaged app will still work without gamepad auto-detect."
          fi

      - name: Smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: .venv/bin/python smb_remap_tool.py --smoke-test

      - name: Build standalone binary
        run: bash ./build_standalone.sh

      - name: Package release files
        run: |
          mkdir -p release
          cp SMBRemapStudio release/SMBRemapStudio-linux-x86_64
          sha256sum release/SMBRemapStudio-linux-x86_64 > release/SMBRemapStudio-linux-x86_64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smb-remap-studio-linux
          path: release/*

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: powershell
        run: .\setup_remap_tool.ps1

      - name: Check optional gamepad backend
        shell: powershell
        run: |
          .\.venv\Scripts\python.exe -c "import pygame"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "pygame backend available."
          }
          else {
            Write-Host "::warning::pygame backend unavailable on Windows build; packaged app will still work without gamepad auto-detect."
            exit 0
          }

      - name: Smoke test
        shell: powershell
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          .\.venv\Scripts\python.exe smb_remap_tool.py --smoke-test

      - name: Build standalone binary
        shell: powershell
        run: .\build_standalone.ps1

      - name: Package release files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath SMBRemapStudio.exe -Destination release\SMBRemapStudio-windows-x86_64.exe -Force
          $hash = (Get-FileHash release\SMBRemapStudio-windows-x86_64.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -LiteralPath release\SMBRemapStudio-windows-x86_64.exe.sha256 -Value "$hash  SMBRemapStudio-windows-x86_64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smb-remap-studio-windows
          path: release/*

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found." >&2
            exit 1
          fi

          if [ "${REF_TYPE}" = "branch" ]; then
            tag="main-latest"
            title="main-latest"
            notes="Automated prerelease for the latest commit on main.

Commit: ${SHA}"

            if gh api "repos/${REPO}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              gh api --method PATCH "repos/${REPO}/git/refs/tags/${tag}" -f sha="${SHA}" -F force=true >/dev/null
            else
              gh api --method POST "repos/${REPO}/git/refs" -f ref="refs/tags/${tag}" -f sha="${SHA}" >/dev/null
            fi

            if gh release view "$tag" >/dev/null 2>&1; then
              gh release edit "$tag" --title "$title" --notes "$notes" --prerelease
              gh release upload "$tag" "${files[@]}" --clobber
            else
              gh release create "$tag" "${files[@]}" --title "$title" --notes "$notes" --prerelease
            fi
          else
            tag="${REF_NAME}"

            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" "${files[@]}" --clobber
            else
              gh release create "$tag" "${files[@]}" --title "$tag" --generate-notes
            fi
          fi
